<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nu Robe Hotel Admin</title>


<style>

body{
font-family:Arial,sans-serif;
background:#08111d;
color:white;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
color:#FFD700;
text-align:center;
}


button{
background:#FFD700;
color:#111;
border:none;
padding:12px 25px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}


.logout{
text-align:right;
margin-bottom:20px;
}


.booking{

background:#122031;
padding:20px;
margin:20px 0;
border-radius:15px;

}


.booking h3{
color:#FFD700;
}


</style>


</head>


<body>


<div class="container">


<div class="logout">

<button id="logout">
Logout
</button>

</div>


<h1>
Nu Robe Hotel Reservations
</h1>



<div id="bookings">

Checking login...

</div>



</div>





<script type="module">


import {initializeApp}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";



import {

getFirestore,

collection,

getDocs,

orderBy,

query

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



import {

getAuth,

onAuthStateChanged,

signOut

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";





const firebaseConfig={


apiKey:"AIzaSyBCEuMH5hH2JpMPANFSIQ6P57A4r5eG6Zk",

authDomain:"nu-robe.firebaseapp.com",

projectId:"nu-robe",

storageBucket:"nu-robe.firebasestorage.app",

messagingSenderId:"994659173220",

appId:"1:994659173220:web:5d53ae9422c77e1d917071"


};



const app=initializeApp(firebaseConfig);


const db=getFirestore(app);


const auth=getAuth(app);



const bookingsDiv=
document.getElementById("bookings");





onAuthStateChanged(auth,(user)=>{


if(user){


loadBookings();


}

else{


window.location="login.html";


}


});







async function loadBookings(){


const q=query(

collection(db,"bookings"),

orderBy("time","desc")

);



const snapshot=await getDocs(q);



bookingsDiv.innerHTML="";



if(snapshot.empty){

bookingsDiv.innerHTML="<h3>No bookings yet</h3>";

return;

}




snapshot.forEach((doc)=>{


let data=doc.data();



bookingsDiv.innerHTML +=`

<div class="booking">

<h3>${data.name}</h3>

<p><b>Phone:</b> ${data.phone}</p>

<p><b>Room:</b> ${data.room}</p>

<p><b>Date:</b> ${data.date}</p>

<p><b>Message:</b> ${data.message}</p>

</div>

`;



});


}




document.getElementById("logout").onclick=()=>{


signOut(auth);


};





</script>


</body>

</html>
